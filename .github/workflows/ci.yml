name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Secret Scan
        run: npm run secrets:scan

      - name: Lint
        run: npm run lint

      - name: Verify
        run: npm run verify

      - name: Build
        run: npm run build
